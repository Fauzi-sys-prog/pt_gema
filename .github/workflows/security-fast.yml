name: Security Fast Gate

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/security-fast.yml'
  workflow_dispatch:

jobs:
  security-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gemadb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d gemadb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gemadb
      JWT_SECRET: ci_jwt_secret_32_chars_minimum_value
      JWT_ISSUER: ptgema-api
      JWT_AUDIENCE: ptgema-client
      JWT_EXPIRES_IN: 8h
      NODE_ENV: test
      SMOKE_BASE_URL: http://localhost:3000
      SMOKE_COOLDOWN_SECONDS: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Sync database schema
        run: npm run push

      - name: Seed accounts
        run: npm run seed:accounts

      - name: Build backend
        run: npm run build

      - name: Start backend
        run: |
          npm run start > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid

      - name: Wait for backend
        run: |
          for i in {1..60}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health || true)
            if [ "$code" = "200" ]; then
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not become ready in time"
          cat /tmp/backend.log || true
          exit 1

      - name: Run security fast smoke
        run: npm run smoke:security-fast

      - name: Print backend log on failure
        if: failure()
        run: cat /tmp/backend.log || true

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/backend.pid ]; then
            kill $(cat /tmp/backend.pid) || true
          fi
