services:
  postgres:
    image: postgres:16-alpine
    container_name: ptgema_postgres_staging
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-./backend/.env.staging}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-gemadb_staging}
    volumes:
      - pgdata_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-gemadb_staging}"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
      target: builder
    container_name: ptgema_migrate_staging
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ${APP_ENV_FILE:-./backend/.env.staging}
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/gemadb_staging}
    command: sh -c "npx prisma db push --accept-data-loss && npx prisma generate"
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: ptgema_backend_staging
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - ${APP_ENV_FILE:-./backend/.env.staging}
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/gemadb_staging}
    volumes:
      - uploads_staging:/app/uploads
    ports:
      - "127.0.0.1:3300:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.staging
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: ptgema_frontend_staging
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:4173:80"

volumes:
  pgdata_staging:
  uploads_staging:
