services:
  postgres:
    image: postgres:16-alpine
    container_name: ptgema_postgres_prod
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-gemadb}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-gemadb}"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
      target: builder
    container_name: ptgema_migrate_prod
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/gemadb}
    command: sh -c "npx prisma migrate deploy && npx prisma generate"
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: ptgema_backend_prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/gemadb}
    volumes:
      - uploads_prod:/app/uploads
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.gemateknik.online}
    container_name: ptgema_frontend_prod
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:5173:80"

volumes:
  pgdata_prod:
  uploads_prod:
