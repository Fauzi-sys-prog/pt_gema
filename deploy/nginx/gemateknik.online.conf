# Production nginx config for gemateknik.online
# Assumptions:
# - Frontend container is published on 127.0.0.1:5173
# - Backend container is published on 127.0.0.1:3000
# - TLS certificates are managed by certbot under /etc/letsencrypt/live/

server {
    listen 80;
    listen [::]:80;
    server_name gemateknik.online www.gemateknik.online api.gemateknik.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.gemateknik.online;

    ssl_certificate     /etc/letsencrypt/live/gemateknik.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gemateknik.online/privkey.pem;

    return 301 https://gemateknik.online$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gemateknik.online;

    ssl_certificate     /etc/letsencrypt/live/gemateknik.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gemateknik.online/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.gemateknik.online;

    ssl_certificate     /etc/letsencrypt/live/api.gemateknik.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.gemateknik.online/privkey.pem;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
